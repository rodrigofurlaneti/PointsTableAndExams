name: Frontend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - '2-FrontEnd/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - '2-FrontEnd/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node 20 ────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '2-FrontEnd/package-lock.json'

      # ── 3. Install + Build ────────────────────────────────────────
      - name: Install dependencies
        working-directory: 2-FrontEnd
        run: npm ci

      - name: Build (production)
        working-directory: 2-FrontEnd
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── 4. Deploy → Azure Static Web Apps ────────────────────────
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:                       ${{ secrets.GITHUB_TOKEN }}
          action:                           'upload'
          app_location:                     '2-FrontEnd'
          output_location:                  'dist'
          skip_app_build:                   true   # já buildamos no passo acima
